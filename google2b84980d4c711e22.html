<script>
window.addEventListener('scroll', function() {
  document.getElementById('rr-nav').classList.toggle('scrolled', window.scrollY > 30);
});

const burger = document.getElementById('rr-burger');
const mobMenu = document.getElementById('rr-mobile');
if (burger && mobMenu) {
  burger.addEventListener('click', function() {
    mobMenu.classList.toggle('open');
    var sp = burger.querySelectorAll('span');
    var o = mobMenu.classList.contains('open');
    sp[0].style.transform = o ? 'rotate(45deg) translate(5px,5px)' : '';
    sp[1].style.opacity = o ? '0' : '1';
    sp[2].style.transform = o ? 'rotate(-45deg) translate(5px,-5px)' : '';
  });
}

document.querySelectorAll('.mob-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.mob-tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.mob-panel').forEach(function(p) { p.classList.remove('open'); });
    tab.classList.add('active');
    document.getElementById(tab.dataset.panel).classList.add('open');
  });
});

// Close mobile menu when a link is clicked
document.querySelectorAll('.mob-panel a').forEach(function(link) {
  link.addEventListener('click', function() {
    var mobMenu = document.getElementById('rr-mobile');
    if (mobMenu) {
      mobMenu.classList.remove('open');
      var burger = document.getElementById('rr-burger');
      if (burger) {
        var sp = burger.querySelectorAll('span');
        if (sp.length >= 3) {
          sp[0].style.transform = '';
          sp[1].style.opacity = '1';
          sp[2].style.transform = '';
        }
      }
    }
  });
});

const phone = document.getElementById('btn-phone');
if (phone) {
  var seq = [['s-normal',2400],['s-grow',380],['s-black',480],['s-shrink',340]];
  var idx = 0;
  function tick() {
    var cls = seq[idx][0];
    var delay = seq[idx][1];
    phone.classList.remove('s-normal','s-grow','s-black','s-shrink');
    phone.classList.add(cls);
    idx = (idx + 1) % seq.length;
    setTimeout(tick, delay);
  }
  setTimeout(tick, 1000);
}
</script>
